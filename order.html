<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформить заказ — Jack cafe</title>
    <link class="styles" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm main-nav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Jack cafe</a>
            <div class="ml-auto d-flex align-items-center">
                <button id="theme-toggle" class="theme-btn mr-4" title="Сменить тему">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="cart.html" class="btn btn-outline-dark btn-sm px-4 rounded-0">В корзину</a>
            </div>
        </div>
    </nav>

    <main class="container my-5 reveal active" style="max-width: 550px;">
        <h3 class="mb-4 text-center">Оформить доставку</h3>
        
        <div class="card p-4 p-md-5 border shadow-sm">
            <form id="order-form">
                <div class="form-group mb-4">
                    <label class="font-weight-bold small text-uppercase text-muted">Ваше имя</label>
                    <input type="text" class="form-control" id="userName" placeholder="Иван Иванов" required>
                </div>

                <div class="form-group mb-4">
                    <label class="font-weight-bold small text-uppercase text-muted">Телефон</label>
                    <input type="tel" class="form-control" placeholder="+7 (978) 000-00-00" required>
                </div>

                <div class="form-group mb-5">
                    <label class="font-weight-bold small text-uppercase text-muted">Адрес доставки в Ялте</label>
                    <textarea class="form-control" rows="2" placeholder="Улица, дом, квартира" required></textarea>
                </div>

                <button type="submit" class="btn btn-dark btn-block btn-lg rounded-0">Отправить заказ</button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        const orderForm = document.getElementById('order-form');
        
        if (orderForm) {
            orderForm.addEventListener('submit', (event) => {
                event.preventDefault(); // Предотвращаем перезагрузку страницы
                
                const cartItems = getCartData();
                if (cartItems.length === 0) {
                    alert("Ваша корзина пуста!");
                    window.location.href = 'index.html';
                    return; // Ранний возврат, прерываем выполнение
                }

                const name = document.getElementById('userName').value;
                // Использование шаблонной строки (ES6) для человечного вывода
                alert(`Успешно, ${name}! Наш бариста уже собирает ваш заказ.`);
                
                // Очищаем корзину
                localStorage.removeItem('jack_cart_items'); 
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
